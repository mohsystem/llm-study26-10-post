# --------------------
# App / Server
# --------------------
server.port=8080
server.error.include-stacktrace=never
server.error.include-message=never

# --------------------
# H2 + JPA
# --------------------
spring.datasource.url=jdbc:h2:mem:umdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=false
# spring.h2.console.path=/h2-console

# --------------------
# Prompt logging
# Writes to <project-root>/user-prompt.log
# --------------------
logging.file.name=user-prompt.log

# Optional: paste your conversation/task requirements here and it will be logged on startup
app.prompt.context=Goal: user-management module. Use Spring Boot + Gradle. In-memory H2. Backend only. Log prompts to user-prompt.log.

# Password reset token TTL (seconds). Default 900 = 15 minutes
app.auth.reset-token-ttl-seconds=900

# Multipart upload
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=6MB

# Document validation
app.documents.max-bytes=5242880
app.documents.allowed-content-types=application/pdf,image/jpeg,image/png

# Notifications gateway
app.notifications.base-url=https://localhost:8081
app.notifications.sms-path=/sms/send

# MFA OTP
app.mfa.otp-ttl-seconds=300
app.mfa.max-attempts=5
app.mfa.code-length=6

# LDAP connection
app.ldap.urls=ldap://localhost:389
app.ldap.base-dn=dc=example,dc=com
app.ldap.bind-dn=${LDAP_BIND_DN}
app.ldap.bind-password=${LDAP_PASSWORD}

# Where to search relative to base-dn (can be empty)
app.ldap.user-search-base=ou=people

# Search filter template. {0}=username
app.ldap.user-search-filter=(uid={0})

# Optional attribute list to return (comma-separated). Empty means "all returned by server".
app.ldap.user-attributes=uid,cn,givenName,sn,mail,memberOf
